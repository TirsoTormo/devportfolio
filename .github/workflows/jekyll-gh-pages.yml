name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Revisa si tu rama se llama 'main' o 'master' y cámbialo si es necesario
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install, build, and upload with Astro
        uses: withastro/action@v3
        # Esta acción detecta automáticamente si usas npm, pnpm o yarn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
